services:
  backend:
    build: ./backend
    ports:
      - "5050:5050" 
    networks:
      - codex_network
    environment:
      MONGO_URI: mongodb://mongo:27017/codex  
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"  
    networks:
      - codex_network
    environment:
      REACT_APP_API_URL: http://backend:5050 

  mongodb:
    image: mongo:latest  
    ports:
      - "27017:27017"  
    networks:
      - codex_network
    volumes:
      - mongo-data:/data/db  

networks:
  codex_network:
    driver: bridge 

volumes:
  mongo-data:
    driver: local  # Persist MongoDB data locally
